apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitoring-system
  namespace: monitoring-system
  labels:
    app: monitoring-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: monitoring-system
  template:
    metadata:
      labels:
        app: monitoring-system
    spec:
      serviceAccountName: monitoring-system-sa
      automountServiceAccountToken: false
      containers:
        - name: monitoring-system
          image: monitoring-system:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: monitoring-system-config
            - secretRef:
                name: monitoring-system-secret
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
              ephemeral-storage: "512Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
              ephemeral-storage: "1Gi"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 40
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
