apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring-system
resources:
  - namespace.yaml
  - serviceaccount.yaml
  - deployment.yaml
  - service-clusterip.yaml
  - service-loadbalancer.yaml
  - hpa.yaml
generatorOptions:
  disableNameSuffixHash: true
configMapGenerator:
  - name: monitoring-system-config
    envs:
      - env/minikube.config.env
secretGenerator:
  - name: monitoring-system-secret
    type: Opaque
    envs:
      - env/minikube.secret.env
